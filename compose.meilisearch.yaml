services:
  meilisearch:
    image: getmeili/meilisearch:v1.41.0
    container_name: all3rounds-meili
    restart: unless-stopped
    ports:
      - "7700:7700"
    environment:
      MEILI_MASTER_KEY: ${MEILISEARCH_MASTER_KEY:?Set MEILISEARCH_MASTER_KEY in .env}
      MEILI_ENV: development
    command: meilisearch --db-path /meili_data
    volumes:
      - all3rounds_meili_data:/meili_data

volumes:
  all3rounds_meili_data:
